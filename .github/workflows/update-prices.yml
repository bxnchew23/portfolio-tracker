name: Update Stock Prices

on:
  schedule:
    # Runs at 22:30 UTC (Mon-Fri) = 6:30 AM SGT next morning, after US market close
    - cron: '30 22 * * 1-5'
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions tab

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit prices.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch latest prices
        run: python update_prices.py

      - name: Commit updated prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update stock prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
